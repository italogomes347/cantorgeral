<!DOCTYPE html>
<html lang="pt-BR">
<head>

<body>

    <header class="main-header">

                    <h3>Italo</h3>
                    <p>Apresentando: <strong>MC Menor</strong></p>
                    <a href="./pages/aluno1.html" class="btn-visitar">Explorar Perfil</a>

            </article>

            <article class="card card-dababy">
                <div class="card-image2" style="background-image: url('./img/dababymenu.jpg');"></div>
                <div class="card-content">
                    <h3>Davi Moreira</h3>
                    <p>Apresentando: <strong>DaBaby</strong></p>

            </article>

            <article class="card card-djonga">
                <div class="card-image3" style="background-image: url('./img/DJONGAmenu.webp');"></div>
                <div class="card-content">
                    <h3>Higor Torres</h3>
                    <p>Apresentando: <strong>DJONGA</strong></p>
                    <a href="./pages/aluno3.html" class="btn-visitar">Explorar Perfil</a>
                </div>
            </article>

            <article class="card card-kevin">
                <div class="card-image4" style="background-image: url('./img/presente2.jpg');"></div>
                <div class="card-content">
                    <h3>Breno</h3>
                    <p>Apresentando: <strong>MC Kevin</strong></p>
                    <a href="./pages/aluno4.html" class="btn-visitar">Explorar Perfil</a>
                </div>

        </section>

</html>
